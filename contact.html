<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>loot nexus</title>
   <link rel="stylesheet" href="main.css">
   <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
   <script src="script.js" defer></script>
 
</head>
<body>
    <nav>
        <div class="nav-inner">
            <h1 class="logo">loot nexus</h1>
            <ul class="nav-links">
                <li><a href="index.html">home</a></li>
                <li><a href="shop.html">shop</a></li>
                <li><a href="contact.html">contact</a></li>
            </ul>
            <div class="icons">
                <a href="cart.html"><i class='bx bx-cart-add'></i><span class="cart-count">0</span></a>
                <a href="contact.html"><i class='bx bx-user'></i></a>
            </div>
        </div>
    </nav>

    <section class="contact-hero">
        <div class="contact-txt">
            <h1>Get in Touch</h1>
            <p>Have questions? We're here to help 24/7</p>
        </div>
    </section>

    <section class="contact-content">
        <div class="contact-info">
            <div class="info-card">
                <i class='bx bxs-envelope'></i>
                <h3>Email</h3>
                <p><a href="contact.html">lootnexus247support@gmail.com</a></p>
                <button type="button" class="copy-email-btn" onclick="copySupportEmail()">Copy support email</button>
                <p class="email-fallback">If the link does not open, copy the email and paste it into your mail app.</p>
            </div>

            <div class="info-card">
                <i class='bx bxl-telegram'></i>
                <h3>Telegram</h3>
                <p><a href="https://t.me/lootnexus_support" target="_blank" rel="noopener noreferrer">lootnexus_support</a></p>
            </div>
        </div>

        <form class="contact-form" onsubmit="return validateForm()">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="subject">Subject</label>
                <input type="text" id="subject" name="subject" required>
            </div>

            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" rows="6" required></textarea>
            </div>

            <button type="submit" class="submit-btn">Send Message</button>
        </form>
    </section>

    <footer>
        <p>loot nexus — fast digital game deals</p>
        <p>© 2026 loot nexus</p>
    </footer>
</body>
</html>
